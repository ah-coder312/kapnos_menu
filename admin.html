<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم كابنوس | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #0a0a0a; --card-bg: #151515; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-black); color: #fff; margin: 0; padding: 20px; }
        
        /* شاشة الدخول */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--main-red); text-align: center; width: 300px; }
        .login-box input { width: 100%; padding: 12px; margin: 20px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; text-align: center; font-size: 1.1rem; }
        .login-box button { background: var(--main-red); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* اللوحة الرئيسية */
        .admin-header { text-align: center; margin-bottom: 30px; }
        .admin-header h1 { color: var(--main-red); font-size: 2rem; margin: 0; }
        
        .add-form { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #333; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .add-form input, .add-form select { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; }
        
        /* الجدول */
        .table-container { overflow-x: auto; background: var(--card-bg); border-radius: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #1a1a1a; padding: 15px; text-align: center; color: var(--main-red); }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        
        .input-edit { background: transparent; border: 1px solid transparent; color: #fff; text-align: center; width: 80%; padding: 5px; border-radius: 4px; transition: 0.3s; }
        .input-edit:focus { background: #222; border-color: #555; outline: none; }
        
        .btn-hide { padding: 6px 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-visible { background: #28a745; color: white; }
        .btn-hidden { background: #666; color: #ccc; }
        .row-is-hidden { opacity: 0.5; background: #1a1010; }
        
        .badge-input { color: #fffb00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--main-red);">KAPNOS ADMIN</h2>
            <input type="password" id="pass-input" placeholder="كلمة السر">
            <button onclick="login()">دخول</button>
            <p id="err" style="color:red; display:none; margin-top:10px;">خطأ في الباسورد!</p>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="admin-header">
            <h1>لوحة إدارة المنيو</h1>
            <p>تحكم كامل في 213 صنف</p>
        </div>

        <div class="add-form">
            <input type="text" id="newName" placeholder="اسم الصنف">
            <input type="number" id="newPrice" placeholder="السعر الأساسي">
            <input type="number" id="newDisc" placeholder="سعر الخصم (اختياري)">
            <input type="text" id="newBadge" placeholder="شارة (مثل: New)">
          <select id="newCat">
    <optgroup label="المشروبات">
        <option value="coffee">☕ القهوة</option>
        <option value="tea">🍵 الشاي</option>
        <option value="hot">🔥 مشروبات ساخنة</option>
        <option value="cold">🥤 مشروبات باردة</option>
        <option value="herbs">🌿 أعشاب</option>
        <option value="fresh">🍋 عصائر فريش</option>
        <option value="smoothie">🍧 سموزي</option>
        <option value="cocktail">🍹 كوكتيل</option>
        <option value="milkshake">🥛 ميلك شيك</option>
        <option value="soda">🫧 مشروبات غازية</option>
        <option value="yogurt">🍦 زبادي</option>
    </optgroup>
    <optgroup label="المأكولات">
        <option value="grill">🥩 المشاوي</option>
        <option value="soup">🥣 الشوربة</option>
        <option value="trays">🍱 الصواني</option>
        <option value="stew">🥘 الطواجن</option>
        <option value="paper_meat">🥩 ورقة اللحمة</option>
        <option value="kitchen">🍳 المطبخ (أرز/ملوخية)</option>
        <option value="salad">🥗 السلطات</option>
        <option value="sandwiches">🥪 سندوتشات</option>
        <option value="meals">🍱 الوجبات</option>
    </optgroup>
    <optgroup label="الحلويات">
        <option value="sweets">🍰 حلويات</option>
    </optgroup>
</select>
            <button onclick="addNewItem()" style="background:var(--main-red); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">إضافة صنف +</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>السعر</th>
                        <th>الخصم</th>
                        <th>الشارة</th>
                        <th>القسم</th>
                        <th>الحالة</th>
                        <th>حذف</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // إعدادات سوبابيس (استخدم بياناتك اللي في الصور)
           const SUPABASE_URL = 'https://ipyboqsodseqzkgqxjev.supabase.co'; 
           const SUPABASE_KEY = 'sb_publishable_xZyMpi5Mfck4k-eQGSfteg_DkyH4jHN'; 
          const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


        const ADMIN_PASS = "12345";
         async function checkLogin(event) {
    if(event) event.preventDefault(); // منع الصفحة من الريفرش 🛑

    const passInput = document.getElementById('admin-pass').value;
    const loginScreen = document.getElementById('login-screen');
    const adminContent = document.getElementById('admin-content');

    if (passInput === ADMIN_PASSWORD) {
        // لو الباسورد صح: إخفاء شاشة الدخول وإظهار لوحة التحكم
        loginScreen.style.display = 'none';
        adminContent.style.display = 'block';
        
        // تشغيل جلب البيانات من سوبابيس
        fetchAdminData(); 
    } else {
        alert("الباسورد غلط يا هندسة! حاول تاني.");
    }
}


        async function loadData() {
            const { data, error } = await _supabase.from('products').select('*').order('id', {ascending: false});
            if(error) return;

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.map(item => `
                <tr class="${item.is_hidden ? 'row-is-hidden' : ''}">
                    <td><input class="input-edit" value="${item.name}" onchange="update(${item.id}, 'name', this.value)"></td>
                    <td><input class="input-edit" type="number" value="${item.price}" onchange="update(${item.id}, 'price', this.value)"></td>
                    <td><input class="input-edit" type="number" value="${item.discount_price || ''}" placeholder="-" onchange="update(${item.id}, 'discount_price', this.value)"></td>
                    <td><input class="input-edit badge-input" value="${item.badge || ''}" onchange="update(${item.id}, 'badge', this.value)"></td>
                    <td>${item.category}</td>
                    <td>
                        <button class="btn-hide ${item.is_hidden ? 'btn-hidden' : 'btn-visible'}" onclick="toggleHide(${item.id}, ${item.is_hidden})">
                            ${item.is_hidden ? 'مخفي' : 'ظاهر'}
                        </button>
                    </td>
                    <td><button onclick="del(${item.id})" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
                </tr>
            `).join('');
        }

        async function update(id, col, val) {
            const updates = {}; updates[col] = val === "" ? null : val;
            await _supabase.from('products').update(updates).eq('id', id);
        }

        async function toggleHide(id, status) {
            await _supabase.from('products').update({ is_hidden: !status }).eq('id', id);
            loadData();
        }

        async function addNewItem() {
            const obj = {
                name: document.getElementById('newName').value,
                price: document.getElementById('newPrice').value,
                discount_price: document.getElementById('newDisc').value || null,
                badge: document.getElementById('newBadge').value || null,
                category: document.getElementById('newCat').value,
                is_hidden: false
            };
            await _supabase.from('products').insert([obj]);
            location.reload();
        }

        async function del(id) {
            if(confirm("حذف نهائي؟")) {
                await _supabase.from('products').delete().eq('id', id);
                loadData();
            }
        }
    </script>
</body>
</html>
